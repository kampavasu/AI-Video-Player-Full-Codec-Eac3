# GitHub Pages Configuration
theme: jekyll-theme-cayman
title: AI Video Player Codec Pack
description: Complete codec pack solution with prebuilt FFmpeg libraries and .so files
show_downloads: false
google_analytics: 
remote_theme: pages-themes/minimal@v0.2.0

# Site Settings
url: "https://AI-Video-Player-Full-Codec.github.io"
baseurl: ""
language: en

# Build Settings
markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# SEO Settings
og:
  image: /og-image.png
twitter:
  username: kampavasu
  card: summary_large_image

# Exclude files/folders from build
exclude:
  - .github
  - .gitignore
  - LICENSE
  - README.md
  - CHANGELOG.md
  - node_modules